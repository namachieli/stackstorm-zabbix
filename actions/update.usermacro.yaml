  macro:
    type: string
    description: "Macro name."
    required: false
  value:
    type: string
    description: "Macro value."
    required: false
  type:
    type: integer
    description: "Type: 0 (text), 1 (secret), 2 (vault secret)."
    required: false
  description:
    type: string
    description: "Macro description."
    required: false
