---
name: create.maintenance
pack: zabbix
runner_type: python-script
description: "Create a maintenance window directly."
enabled: true
entry_point: call_api.py
parameters:
  api_method:
    default: "maintenance.create"
    immutable: true
  name:
    type: string
    description: "Name of the maintenance window."
    required: true
  active_since:
    type: string
    description: "Active since (unix timestamp)."
    required: true
  active_till:
    type: string
    description: "Active till (unix timestamp)."
    required: true
  hosts:
    type: array
    description: "Hosts in maintenance (e.g. [{'hostid': '10084'}])."
    required: false
  groups:
    type: array
    description: "Host groups in maintenance (e.g. [{'groupid': '2'}])."
    required: false
  timeperiods:
    type: array
    description: "Time periods."
    required: true
  maintenance_type:
    type: integer
    description: "Type: 0 (with data collection), 1 (without)."
    required: false
  description:
    type: string
    description: "Description."
    required: false
  tags:
    type: array
    description: "Problem tags for maintenance."
    required: false
