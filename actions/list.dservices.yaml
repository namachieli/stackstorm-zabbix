---
name: list.dservices
pack: zabbix
runner_type: python-script
description: "List discovered services."
enabled: true
entry_point: call_api.py
parameters:
  api_method:
    default: "dservice.get"
    immutable: true
  filter:
    type: object
    description: "Filter conditions."
    required: false
  output:
    type: string
    description: "Output fields. Use 'extend' for all."
    default: "extend"
  search:
    type: object
    description: "Search by pattern."
    required: false
  limit:
    type: integer
    description: "Maximum number of results."
    required: false
  sortfield:
    type: string
    description: "Field to sort by."
    required: false
  sortorder:
    type: string
    description: "Sort order: ASC or DESC."
    required: false
  dhostids:
    type: array
    description: "Filter by discovered host IDs."
    required: false
  druleids:
    type: array
    description: "Filter by discovery rule IDs."
    required: false
  dserviceids:
    type: array
    description: "Filter by specific discovered service IDs."
    required: false
