---
name: get.maintenance
pack: zabbix
runner_type: python-script
description: "Get a maintenance window by ID."
enabled: true
entry_point: call_api.py
parameters:
  api_method:
    default: "maintenance.get"
    immutable: true
  maintenanceids:
    type: array
    description: "Maintenance IDs to retrieve."
    required: true
  output:
    type: string
    description: "Output fields. Use 'extend' for all."
    default: "extend"
  selectHosts:
    type: string
    description: "Include hosts. Set to 'extend'."
    required: false
  selectGroups:
    type: string
    description: "Include groups. Set to 'extend'."
    required: false
  selectTimeperiods:
    type: string
    description: "Include time periods. Set to 'extend'."
    required: false
