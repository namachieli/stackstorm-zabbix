---
name: find.proxy
pack: zabbix
runner_type: python-script
description: "Resolve a proxy name to its proxy ID."
enabled: true
entry_point: find_object.py
parameters:
  object_type:
    default: "proxy"
    immutable: true
  filter_field:
    default: "host"
    immutable: true
  id_field:
    default: "proxyid"
    immutable: true
  allow_multiple:
    default: false
    immutable: true
  name:
    type: string
    description: "Name of the Zabbix proxy."
    required: true
