---
name: create_or_update.maintenance
pack: zabbix
runner_type: python-script
description: "Create a maintenance window or update it if one with the same name exists."
enabled: true
entry_point: maintenance_create_or_update.py
parameters:
  hostname:
    type: string
    description: "Name of the Zabbix host to put in maintenance."
    required: true
  maintenance_window_name:
    type: string
    description: "Name of the maintenance window."
    required: true
  start_date:
    type: string
    description: "Start date/time in format 'Y-m-d H:M'."
    required: true
  end_date:
    type: string
    description: "End date/time in format 'Y-m-d H:M'."
    required: true
  time_type:
    type: integer
    description: "Period type: 0 (one time), 2 (daily), 3 (weekly), 4 (monthly)."
    default: 0
  maintenance_type:
    type: integer
    description: "Type: 0 (with data collection), 1 (without data collection)."
    default: 0
