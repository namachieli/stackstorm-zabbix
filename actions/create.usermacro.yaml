runner_type: python-script
description: "Create a host user macro."
enabled: true
entry_point: call_api.py
parameters:
  api_method:
    default: "usermacro.create"
    immutable: true
  hostid:
    type: string
    description: "ID of the host."
    required: true
  macro:
    type: string
    description: "Macro name (e.g. '{$MACRO}')."
    required: true
  value:
    type: string
    description: "Macro value."
    required: true
  type:
    type: integer
    description: "Type: 0 (text), 1 (secret), 2 (vault secret)."
    required: false
  description:
    type: string
    description: "Macro description."
    required: false
