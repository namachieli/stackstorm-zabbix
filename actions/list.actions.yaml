---
name: list.actions
pack: zabbix
runner_type: python-script
description: "List Zabbix alert actions."
enabled: true
entry_point: call_api.py
parameters:
  api_method:
    default: "action.get"
    immutable: true
  filter:
    type: object
    description: "Filter conditions."
    required: false
  output:
    type: string
    description: "Output fields. Use 'extend' for all."
    default: "extend"
  search:
    type: object
    description: "Search by pattern."
    required: false
  limit:
    type: integer
    description: "Maximum number of results."
    required: false
  sortfield:
    type: string
    description: "Field to sort by."
    required: false
  sortorder:
    type: string
    description: "Sort order: ASC or DESC."
    required: false
  actionids:
    type: array
    description: "Filter by action IDs."
    required: false
  selectOperations:
    type: string
    description: "Include operations. Set to 'extend'."
    required: false
  selectRecoveryOperations:
    type: string
    description: "Include recovery operations. Set to 'extend'."
    required: false
