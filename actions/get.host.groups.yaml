---
name: get.host.groups
pack: zabbix
runner_type: python-script
description: "Get host group membership for one or more hosts by host ID."
enabled: true
entry_point: call_api.py
parameters:
  api_method:
    default: "host.get"
    immutable: true
  hostids:
    type: array
    description: "List of host IDs to retrieve groups for."
    required: true
  selectGroups:
    default: "extend"
    immutable: true
  output:
    type: array
    description: "Host fields to include alongside groups."
    default:
      - "hostid"
      - "host"
