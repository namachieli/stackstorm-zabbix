---
name: list.scripts
pack: zabbix
runner_type: python-script
description: "List Zabbix scripts."
enabled: true
entry_point: call_api.py
parameters:
  api_method:
    default: "script.get"
    immutable: true
  filter:
    type: object
    description: "Filter conditions."
    required: false
  output:
    type: string
    description: "Output fields. Use 'extend' for all."
    default: "extend"
  search:
    type: object
    description: "Search by pattern."
    required: false
  limit:
    type: integer
    description: "Maximum number of results."
    required: false
  sortfield:
    type: string
    description: "Field to sort by."
    required: false
  sortorder:
    type: string
    description: "Sort order: ASC or DESC."
    required: false
  hostids:
    type: array
    description: "Filter scripts available for these hosts."
    required: false
  groupids:
    type: array
    description: "Filter scripts available for these host groups."
    required: false
  scriptids:
    type: array
    description: "Filter by specific script IDs."
    required: false
