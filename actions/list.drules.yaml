---
name: list.drules
pack: zabbix
runner_type: python-script
description: "List network discovery rules."
enabled: true
entry_point: call_api.py
parameters:
  api_method:
    default: "drule.get"
    immutable: true
  filter:
    type: object
    description: "Filter conditions."
    required: false
  output:
    type: string
    description: "Output fields. Use 'extend' for all."
    default: "extend"
  search:
    type: object
    description: "Search by pattern."
    required: false
  limit:
    type: integer
    description: "Maximum number of results."
    required: false
  sortfield:
    type: string
    description: "Field to sort by."
    required: false
  sortorder:
    type: string
    description: "Sort order: ASC or DESC."
    required: false
  druleids:
    type: array
    description: "Filter by discovery rule IDs."
    required: false
  selectDChecks:
    type: string
    description: "Include discovery checks. Set to 'extend'."
    required: false
