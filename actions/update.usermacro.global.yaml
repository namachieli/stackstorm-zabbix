---
name: update.usermacro.global
pack: zabbix
runner_type: python-script
description: "Update a global user macro."
enabled: true
entry_point: call_api.py
parameters:
  api_method:
    default: "usermacro.updateglobal"
    immutable: true
  globalmacroid:
    type: string
    description: "ID of the global macro to update."
    required: true
  macro:
    type: string
    description: "Macro name."
    required: false
  value:
    type: string
    description: "Macro value."
    required: false
  type:
    type: integer
    description: "Type: 0 (text), 1 (secret), 2 (vault secret)."
    required: false
  description:
    type: string
    description: "Macro description."
    required: false
