---
name: find.script
pack: zabbix
runner_type: python-script
description: "Resolve a script name to its script ID."
enabled: true
entry_point: find_object.py
parameters:
  object_type:
    default: "script"
    immutable: true
  filter_field:
    default: "name"
    immutable: true
  id_field:
    default: "scriptid"
    immutable: true
  allow_multiple:
    default: false
    immutable: true
  name:
    type: string
    description: "Name of the script."
    required: true
