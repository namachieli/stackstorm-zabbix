---
name: list.users
pack: zabbix
runner_type: python-script
description: "List Zabbix users."
enabled: true
entry_point: call_api.py
parameters:
  api_method:
    default: "user.get"
    immutable: true
  filter:
    type: object
    description: "Filter conditions."
    required: false
  output:
    type: string
    description: "Output fields. Use 'extend' for all."
    default: "extend"
  search:
    type: object
    description: "Search by pattern."
    required: false
  limit:
    type: integer
    description: "Maximum number of results."
    required: false
  sortfield:
    type: string
    description: "Field to sort by."
    required: false
  sortorder:
    type: string
    description: "Sort order: ASC or DESC."
    required: false
  userids:
    type: array
    description: "Filter by user IDs."
    required: false
  usrgrpids:
    type: array
    description: "Filter by user group IDs."
    required: false
  selectMedias:
    type: string
    description: "Include user medias. Set to 'extend'."
    required: false
  selectUsrgrps:
    type: string
    description: "Include user groups. Set to 'extend'."
    required: false
